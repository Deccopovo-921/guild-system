function showToast(msg, type) {
    type = type || 'info';
    var c = document.getElementById('toastContainer');
    var t = document.createElement('div');
    t.className = 'toast ' + type;
    t.textContent = msg;
    c.appendChild(t);
    setTimeout(function() {
        t.classList.add('fadeout');
        setTimeout(function() { t.remove(); }, 300);
    }, 2800);
}

async function supabaseFetch(endpoint, method, body) {
    method = method || 'GET';
    var url = SUPABASE_URL + '/' + endpoint;
    var headers = {
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation'
    };
    var options = { method: method, headers: headers };
    if (body && method !== 'GET') options.body = JSON.stringify(body);
    var res = await fetch(url, options);
    if (!res.ok) {
        var err = await res.json().catch(function() { return {}; });
        throw new Error(err.message || 'HTTP ' + res.status);
    }
    var text = await res.text();
    return text ? JSON.parse(text) : [];
}

async function doLogin() {
    var input = document.getElementById('loginInput').value.trim();
    if (!input) { showToast('⚠️请输入密钥或邀请码', 'warning'); return; }
    if (input === ADMIN_KEY) {
        session.set({ role: 'admin' });
        currentRole = 'admin';
        currentGuildId = null;
        showToast('👑欢迎管理员！', 'success');
        showMainPage();
        await loadAdminPage();
        return;
    }
    if (/^\d{5}$/.test(input)) {
        try {
            var guilds = await db.guilds.getByCode(input);
            if (guilds.length === 0) { showToast('❌邀请码不存在，请核对', 'error'); return; }
            var guild = guilds[0];
            session.set({ role: 'member', guildId: guild.id });
            currentRole = 'member';
            currentGuildId = guild.id;
            rememberCode(input);
            showToast('🎉欢迎加入「' + guild.name + '」！', 'success');
            showMainPage();
            await loadMemberPage(guild);
        } catch (e) { showToast('❌网络错误', 'error'); }
        return;
    }
    showToast('⚠️格式错误', 'warning');
}

function setupTabs(tabs) {
    var tabNav = document.getElementById('tabNav');
    var tabContent = document.getElementById('tabContent');
    tabNav.innerHTML = '';
    tabContent.innerHTML = '';
    tabs.forEach(function(tab, i) {
        var btn = document.createElement('div');
        btn.className = 'tab' + (i === 0 ? ' active' : '');
        btn.textContent = tab.name;
        btn.addEventListener('click', function() {
            tabNav.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
            btn.classList.add('active');
            tabContent.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
            document.getElementById(tab.id).classList.add('active');
        });
        tabNav.appendChild(btn);
        var panel = document.createElement('div');
        panel.className = 'tab-content' + (i === 0 ? ' active' : '');
        panel.id = tab.id;
        tabContent.appendChild(panel);
    });
    initAdminSearchTab();
    initTaskMgrTab();
    initMemberMgrTab();
    initRecommendTab();
    initGuildMgrTab();

async function searchMemberForAdmin() {
    var q = document.getElementById('adminSearchMember').value.trim();
    var div = document.getElementById('adminMemberResult');
    if (!q || !currentGuildId) {
        div.innerHTML = !currentGuildId ? '<div class="empty-state"><div class="icon">⚠️</div><div class="text">请先进公会</div></div>' : '';
        return;
    }
    showToast('🔍搜索中...', 'info');
    try {
        var members = await db.members.list(currentGuildId);
        var filtered = members.filter(function(m) { return m.real_name.includes(q) || (m.alias || '').includes(q); });
        if (!filtered.length) {
            div.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><div class="text">未找到</div></div>';
            return;
        }
        var targets = await db.recommendTargets.list(currentGuildId);
        var targetMap = {};
        targets.forEach(function(rt) {
            targetMap[rt.member_id] = {
                targetScore: rt.target_score,
                selectedScores: rt.selected_scores ? rt.selected_scores.split(',').map(Number) : []
            };
        });
        var html = '';
        for (var i = 0; i < filtered.length; i++) {
            var m = filtered[i];
            var tml = await db.taskMembers.listByMember(m.id);
            var tids = tml.map(function(t) { return t.task_id; });
            var tasks = allTasks.filter(function(t) { return tids.includes(t.id); });
            tasks.sort(function(a, b) { return b.score - a.score; });
            var target = targetMap[m.id];
            var priorityTasks = [];
            var otherTasks = [];
            if (target && target.selectedScores.length > 0) {
                priorityTasks = tasks.filter(function(t) { return target.selectedScores.includes(t.score); });
                otherTasks = tasks.filter(function(t) { return !target.selectedScores.includes(t.score); });
                priorityTasks.sort(function(a, b) { return b.score - a.score; });
                otherTasks.sort(function(a, b) { return b.score - a.score; });
            } else {
                otherTasks = tasks;
                otherTasks.sort(function(a, b) { return b.score - a.score; });
            }
            html += '<div class="card"><div class="card-header"><span class="card-title">👤' + m.real_name + '</span></div>';
            html += '<div style="font-size:11px;color:var(--text2);">别名：' + (m.alias || '无') + '</div>';
            html += '<div style="font-size:11px;color:var(--gold);font-weight:600;">📋能做：共 ' + tasks.length + ' 个任务</div>';
            if (priorityTasks.length > 0) {
                html += '<div style="font-size:11px;color:var(--accent);margin-top:4px;">⭐ 优先推荐（' + priorityTasks.length + '个）：</div>';
                html += '<div class="member-tags">' + priorityTasks.map(function(t) { return '<span class="tag gold">' + t.task_name + ' ⭐' + t.score + '</span>'; }).join('') + '</div>';
                html += '<hr style="border-color:var(--border);margin:4px 0;">';
            }
            if (otherTasks.length > 0) {
                html += '<div style="font-size:11px;color:var(--text2);margin-top:4px;">📋 所有能做的任务（' + otherTasks.length + '个）：</div>';
                html += '<div class="member-tags">' + otherTasks.map(function(t) { return '<span class="tag gold">' + t.task_name + ' ⭐' + t.score + '</span>'; }).join('') + '</div>';
            }
            html += '</div>';
        }
        div.innerHTML = html;
        showToast('✅找到' + filtered.length + '位成员', 'success');
    } catch (e) {
        div.innerHTML = '<div class="empty-state"><div class="icon">❌</div><div class="text">查询失败</div></div>';
        showToast('❌查询失败', 'error');
        console.error(e);
    }
}

async function searchTaskForAdmin() {

        div.innerHTML = !currentGuildId ? '<div class="empty-state"><div class="icon">⚠️</div><div class="text">请先进公会</div></div>' : '';
        return;
    }
    showToast('🔍搜索中...', 'info');
    try {
        var tasks = await db.tasks.list(currentGuildId);
        var filtered = tasks.filter(function(t) { return t.task_name.includes(q); });
        if (!filtered.length) {
            div.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><div class="text">未找到</div></div>';
            return;
        }
        var targets = await db.recommendTargets.list(currentGuildId);
        var targetMap = {};
        targets.forEach(function(rt) {
            targetMap[rt.member_id] = {
                targetScore: rt.target_score,
                selectedScores: rt.selected_scores ? rt.selected_scores.split(',').map(Number) : []
            };
        });
        var html = '';
        for (var i = 0; i < filtered.length; i++) {
            var t = filtered[i];
            var tml = await db.taskMembers.list(t.id);
            var mids = tml.map(function(tm) { return tm.member_id; });
            var allMembersList = await db.members.list(currentGuildId);
            var members = allMembersList.filter(function(m) { return mids.includes(m.id); });
            var wantMembers = [];
            var otherMembers = [];
            for (var j = 0; j < members.length; j++) {
                var m = members[j];
                var target = targetMap[m.id];
                if (target && target.selectedScores.includes(t.score) && target.targetScore >= t.score) {
                    wantMembers.push(m);
                } else {
                    otherMembers.push(m);
                }
            }
            html += '<div class="card"><div class="card-header"><span class="card-title">📋' + t.task_name + '</span><span class="tag gold">⭐' + t.score + '分</span></div>';

                html += '<div class="member-tags">' + wantMembers.map(function(m) { return '<span class="member-tag">' + m.real_name + '</span>'; }).join('') + '</div>';
                if (otherMembers.length > 0) html += '<hr style="border-color:var(--border);margin:4px 0;">';

            if (otherMembers.length > 0) {
                html += '<div style="font-size:11px;color:var(--text2);margin-top:4px;">👥 其他能做的人（共' + otherMembers.length + '人）：</div>';
                html += '<div class="member-tags">' + otherMembers.map(function(m) { return '<span class="member-tag">' + m.real_name + '</span>'; }).join('') + '</div>';
            }
            if (members.length === 0) html += '<div style="font-size:11px;color:var(--text2);margin-top:4px;">暂无成员能做</div>';
            html += '</div>';
        }
        div.innerHTML = html;
        showToast('✅找到' + filtered.length + '个任务', 'success');
    } catch (e) {
        div.innerHTML = '<div class="empty-state"><div class="icon">❌</div><div class="text">查询失败</div></div>';
        showToast('❌查询失败', 'error');
        console.error(e);
    }

async function filterMemberSearch(input, dropdown) {
    var q = input.value.trim().toLowerCase();
    dropdown.innerHTML = '';
    if (!q || !currentGuildId) { dropdown.classList.remove('show'); return; }
    try {
        var members = await db.members.list(currentGuildId);
        var filtered = members.filter(function(m) { return m.real_name.toLowerCase().includes(q) || (m.alias || '').toLowerCase().includes(q); });
        if (!filtered.length) {
            dropdown.innerHTML = '<div class="ms-item" style="color:var(--text2);">未找到</div>';
        } else {
            filtered.forEach(function(m) {
                var item = document.createElement('div');
                item.className = 'ms-item';
                item.textContent = m.real_name;
                item.addEventListener('click', function() {
                    input.value = m.real_name;
                    dropdown.classList.remove('show');
                    selectedMemberForTasks = m;
                    document.getElementById('selectedMemberDisplay').innerHTML = '已选成员：<span style="color:var(--text);font-weight:600;">' + m.real_name + '</span>';
                    loadMemberTaskChecklistForMember(m.id);
                });
                dropdown.appendChild(item);
            });
        }
        dropdown.classList.add('show');
    } catch (e) { console.error(e); }
}

async function loadMemberTaskChecklistForMember(memberId) {
    var container = document.getElementById('memberTaskCheckList');
    if (!memberId) {
        container.innerHTML = '<div style="color:var(--text2);font-size:12px;grid-column:1/-1;text-align:center;padding:12px;">请先选择成员</div>';
        return;
    }
    try {
        var tasks = await db.tasks.list(currentGuildId);
        if (!tasks.length) {
            container.innerHTML = '<div style="color:var(--text2);font-size:12px;grid-column:1/-1;text-align:center;padding:12px;">⚠️ 暂无任务</div>';
            return;
        }
        var existing = await db.taskMembers.listByMember(memberId);
        var existingTaskIds = new Set(existing.map(function(t) { return t.task_id; }));
        var html = '';
        tasks.forEach(function(t) {
            var exists = existingTaskIds.has(t.id);
            var disabled = exists ? 'disabled' : '';
            var checked = exists ? 'checked' : '';
            html += '<div class="task-check-item ' + (exists ? 'disabled' : '') + '">';
            html += '<input type="checkbox" ' + checked + ' ' + disabled + ' data-taskid="' + t.id + '" data-taskname="' + t.task_name + '" onchange="updateMemberTaskCount()">';
            html += '<span class="tci-name">' + t.task_name + '</span>';
            html += '<span class="tci-score">⭐' + t.score + '分</span>';
            if (exists) html += '<span class="tci-existing">✅ 已有</span>';
            html += '</div>';
        });
        container.innerHTML = html;
        updateMemberTaskCount();
    } catch (e) {
        container.innerHTML = '<div style="color:var(--danger);font-size:12px;grid-column:1/-1;text-align:center;padding:12px;">❌ 加载失败</div>';
        console.error(e);
    }
}

function updateMemberTaskCount() {
    var checked = document.querySelectorAll('#memberTaskCheckList input[type="checkbox"]:checked:not(:disabled)').length;
    document.getElementById('memberTaskCount').textContent = '已选 ' + checked + ' 个任务';
}

async function memberAddTasks() {
    if (!selectedMemberForTasks) { showToast('⚠️请先选择成员', 'warning'); return; }

}

function autoClassifyTask(taskName) {
    if (!taskName) return { category: '无', subTag: '无' };
    for (var i = 0; i < CLASSIFY_RULES['守护神_无'].length; i++) {
        if (taskName.includes(CLASSIFY_RULES['守护神_无'][i])) return { category: '守护神', subTag: '无' };
    }
    if (taskName.startsWith('觉醒') || taskName.includes('觉醒')) {
        for (var key in CLASSIFY_RULES) {
            if (key.startsWith('人才_') || key.startsWith('人才皮肤_')) {
                var subTag2 = key.split('_')[1];
                for (var j = 0; j < CLASSIFY_RULES[key].length; j++) {
                    if (taskName.includes(CLASSIFY_RULES[key][j])) return { category: '人才觉醒', subTag: subTag2 };
                }
            }
        }
        return { category: '人才觉醒', subTag: '无' };
    }
    if (/^[567]00级/.test(taskName)) {
        for (var key2 in CLASSIFY_RULES) {
            if (key2.startsWith('人才_') || key2.startsWith('人才皮肤_')) {
                var subTag3 = key2.split('_')[1];
                for (var k = 0; k < CLASSIFY_RULES[key2].length; k++) {
                    if (taskName.includes(CLASSIFY_RULES[key2][k])) {
                        var category = key2.startsWith('人才皮肤') ? '人才皮肤' : '人才';
                        return { category: category, subTag: subTag3 };
                    }
                }
            }
        }
        return { category: '人才', subTag: '无' };
    }
    for (var key3 in CLASSIFY_RULES) {
        if (key3.startsWith('人才皮肤_')) {
            var subTag4 = key3.split('_')[1];
            for (var l = 0; l < CLASSIFY_RULES[key3].length; l++) {
                if (taskName.includes(CLASSIFY_RULES[key3][l])) return { category: '人才皮肤', subTag: subTag4 };
            }
        }
    }
    for (var key4 in CLASSIFY_RULES) {
        if (key4.startsWith('艺人皮肤_')) {
            var subTag5 = key4.split('_')[1];
            for (var m = 0; m < CLASSIFY_RULES[key4].length; m++) {
                if (taskName.includes(CLASSIFY_RULES[key4][m])) return { category: '艺人皮肤', subTag: subTag5 };
            }
        }
    }
    for (var key5 in CLASSIFY_RULES) {
        if (key5.startsWith('人才_')) {
            var subTag6 = key5.split('_')[1];
            for (var n = 0; n < CLASSIFY_RULES[key5].length; n++) {
                if (taskName.includes(CLASSIFY_RULES[key5][n])) return { category: '人才', subTag: subTag6 };
            }
        }
    }
    for (var key6 in CLASSIFY_RULES) {
        if (key6.startsWith('艺人_')) {
            var subTag7 = key6.split('_')[1];
            for (var o = 0; o < CLASSIFY_RULES[key6].length; o++) {
                if (taskName.includes(CLASSIFY_RULES[key6][o])) return { category: '艺人', subTag: subTag7 };
            }
        }
    }
    return { category: '无', subTag: '无' };
}

async function addTask() {
    if (!currentGuildId) { showToast('⚠️请先进公会', 'warning'); return; }
    var name = document.getElementById('newTaskName').value.trim();
    var score = parseInt(document.getElementById('newTaskScore').value) || 0;
    var category = document.getElementById('newTaskCategory').value || '无';
    var subTag = document.getElementById('newTaskSubTag').value || '无';

async function batchImportTasks() {
    if (!currentGuildId) { showToast('⚠️请先进公会', 'warning'); return; }
    var text = document.getElementById('batchTaskImport').value.trim();
    if (!text) { showToast('⚠️请输入任务数据', 'warning'); return; }
    var existingTasks = await db.tasks.list(currentGuildId);
    var existingNames = new Set(existingTasks.map(function(t) { return t.task_name; }));
    var lines = text.split('\n').filter(function(l) { return l.trim(); });
    var s = 0, f = 0, skip = 0;
    var validCategories = TASK_CATEGORIES.map(function(c) { return c.id; });
    for (var i = 0; i < lines.length; i++) {
        var parts = lines[i].split(',').map(function(p) { return p.trim(); });
        var name = parts[0];
        if (!name) { f++; continue; }
        if (existingNames.has(name)) { skip++; continue; }
        var score = parseInt(parts[1]) || 0;
        var category = '无';
        if (parts[2] && validCategories.includes(parts[2])) category = parts[2];
        var subTag = '无';
        if (parts[3] && SUB_TAGS.includes(parts[3])) subTag = parts[3];
        try {
            await db.tasks.create({ guild_id: currentGuildId, task_name: name, score: score, category: category, sub_tag: subTag });
            existingNames.add(name);
            s++;
        } catch (e) { console.warn('任务导入失败:', name, e.message); f++; }
    }
    var msg = '✅成功导入' + s + '个';
    if (skip > 0) msg += '，跳过' + skip + '个重复';
    if (f > 0) msg += '，失败' + f + '个';
    showToast(msg, s > 0 ? 'success' : 'warning');
    document.getElementById('batchTaskImport').value = '';
    loadTasksToSelect();
    loadTaskList();
}

async function batchTaskMemberImport() {
    if (!currentGuildId) { showToast('⚠️请先进公会', 'warning'); return; }
    var text = document.getElementById('batchTaskMemberInput').value.trim();
    if (!text) { showToast('⚠️请输入数据', 'warning'); return; }
    var resultDiv = document.getElementById('batchTaskMemberResult');
    resultDiv.innerHTML = '<div style="color:var(--text2);">⏳ 处理中...</div>';
    var lines = text.split('\n').filter(function(l) { return l.trim(); });
    var totalAdded = 0, totalSkipped = 0, totalFailed = 0;
    var allTasks = await db.tasks.list(currentGuildId);
    var allMembers = await db.members.list(currentGuildId);
    if (!allTasks.length) {
        resultDiv.innerHTML = '<div style="color:var(--danger);">⚠️ 请先创建任务！</div>';
        return;
    }
    for (var i = 0; i < lines.length; i++) {
        var parts = lines[i].split(/[,，、]/).map(function(s) { return s.trim(); }).filter(function(s) { return s; });
        if (parts.length < 2) { totalFailed++; continue; }
        var taskName = parts[0];
        var memberNames = parts.slice(1);
        var matchedTask = null;
        for (var j = 0; j < allTasks.length; j++) {
            if (allTasks[j].task_name.includes(taskName) || taskName.includes(allTasks[j].task_name)) {
                matchedTask = allTasks[j];
                break;
            }
        }
        if (!matchedTask) { totalFailed++; continue; }
        var existingRelations = await db.taskMembers.list(matchedTask.id);
        var existingMemberIds = new Set(existingRelations.map(function(r) { return r.member_id; }));
        for (var k = 0; k < memberNames.length; k++) {
            var memberName = memberNames[k];
            var matchedMember = null;
            for (var l = 0; l < allMembers.length; l++) {
                var m = allMembers[l];
                if (m.real_name.includes(memberName) || memberName.includes(m.real_name) || (m.alias && (m.alias.includes(memberName) || memberName.includes(m.alias)))) {
                    matchedMember = m;
                    break;
                }
            }
            var member = matchedMember;
            if (!member) {
                try {
                    var created = await db.members.create({ guild_id: currentGuildId, real_name: memberName, alias: '' });
                    if (created && created.length) member = created[0];
                    else { totalFailed++; continue; }
                } catch (e) { totalFailed++; continue; }
            }
            if (existingMemberIds.has(member.id)) { totalSkipped++; continue; }
            try {
                await db.taskMembers.add({ task_id: matchedTask.id, member_id: member.id });
                existingMemberIds.add(member.id);
                totalAdded++;
            } catch (e) { totalFailed++; }
        }
    }
    var summary = '📊 完成！添加 ' + totalAdded + ' 人';
    if (totalSkipped > 0) summary += '，跳过 ' + totalSkipped + ' 人（已存在）';
    if (totalFailed > 0) summary += '，失败 ' + totalFailed + ' 个操作';
    resultDiv.innerHTML = '<div style="font-weight:600;color:var(--text);">' + summary + '</div>';
    showToast(summary, totalAdded > 0 ? 'success' : 'warning');
    document.getElementById('batchTaskMemberInput').value = '';
    setTimeout(function() { resultDiv.innerHTML = ''; }, 3000);
    await refreshCurrentGuildData();
    loadTasksToSelect();
    loadTaskList();
}

async function loadTaskList() {
    var div = document.getElementById('taskList');
    if (!div || !currentGuildId) return;
    try {
        allTasks = await db.tasks.list(currentGuildId);
        if (!allTasks.length) {
            div.innerHTML = '<div class="empty-state"><div class="icon">📭</div><div class="text">还没有任务</div></div>';
            return;
        }
        var taskIds = allTasks.map(function(t) { return t.id; });
        var allTaskMembers = [];
        for (var i = 0; i < taskIds.length; i += 50) {
            var batch = taskIds.slice(i, i + 50);
            var ids = batch.join(',');
            var results = await supabaseFetch('task_members?task_id=in.(' + ids + ')&select=*');
            allTaskMembers = allTaskMembers.concat(results);
        }
        var taskMemberMap = {};
        for (var j = 0; j < allTaskMembers.length; j++) {
            var tm = allTaskMembers[j];
            if (!taskMemberMap[tm.task_id]) taskMemberMap[tm.task_id] = [];
            taskMemberMap[tm.task_id].push(tm.member_id);
        }

        var categorized = {};
        for (var k = 0; k < TASK_CATEGORIES.length; k++) {
            categorized[TASK_CATEGORIES[k].id] = [];
        }
        categorized['无'] = [];
        for (var l = 0; l < allTasks.length; l++) {
            var t = allTasks[l];
            var cat = t.category;
            if (!cat || !TASK_CATEGORIES.some(function(c) { return c.id === cat; })) cat = '无';
            if (!categorized[cat]) categorized[cat] = [];
            categorized[cat].push(t);
        }

        var html = '';

function toggleTaskPeople(taskId) {
    var people = document.getElementById('people_' + taskId);
    var tog = document.getElementById('tog_' + taskId);
    if (!people) return;
    if (people.classList.contains('open')) {
        people.classList.remove('open');
        if (tog) tog.classList.remove('open');
        sessionStorage.setItem('task_open_' + taskId, 'closed');
    } else {
        people.classList.add('open');
        if (tog) tog.classList.add('open');
        sessionStorage.setItem('task_open_' + taskId, 'open');
    }
}

function toggleCategory(catId) {
    var body = document.getElementById('body_' + catId);
    var arrow = document.getElementById('arrow_' + catId);
    if (!body) return;
    if (body.classList.contains('open')) {
        body.classList.remove('open');
        body.classList.add('closed');
        if (arrow) arrow.classList.remove('open');
        sessionStorage.setItem('cat_open_' + catId, 'closed');
    } else {
        body.classList.remove('closed');
        body.classList.add('open');
        if (arrow) arrow.classList.add('open');
        sessionStorage.setItem('cat_open_' + catId, 'open');
    }
}

function toggleSubTag() {
    showSubTag = !showSubTag;
    loadTaskList();
}

function toggleSubCategory(id) {
    var body = document.getElementById('body_' + id);
    var arrow = document.getElementById('arrow_' + id);
    if (!body) return;
    if (body.classList.contains('open')) {
        body.classList.remove('open');
        body.classList.add('closed');
        if (arrow) arrow.classList.remove('open');
        sessionStorage.setItem('sub_open_' + id, 'closed');
    } else {
        body.classList.remove('closed');
        body.classList.add('open');
        if (arrow) arrow.classList.add('open');
        sessionStorage.setItem('sub_open_' + id, 'open');
    }
}

async function editTask(id, oldName, oldScore) {
    var overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;';
    var currentTask = allTasks.find(function(t) { return t.id === id; });
    var currentSubTag = currentTask ? currentTask.sub_tag || '无' : '无';
    var currentCategory = currentTask ? currentTask.category || '无' : '无';
    var dialog = document.createElement('div');
    dialog.style.cssText = 'background:var(--card);padding:24px;border-radius:12px;border:1px solid var(--border);max-width:420px;width:90%;';
    dialog.innerHTML = '<div style="font-size:17px;font-weight:600;color:#fff;margin-bottom:14px;">✏️ 编辑任务</div>';
    dialog.innerHTML += '<div style="margin-bottom:10px;"><label style="display:block;font-size:12px;color:var(--text2);margin-bottom:4px;">📝 任务名称</label><input id="editTaskNameInput" type="text" value="' + oldName.replace(/"/g, '&quot;') + '" style="width:100%;padding:8px 10px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;font-size:14px;outline:none;"></div>';
    dialog.innerHTML += '<div style="margin-bottom:10px;"><label style="display:block;font-size:12px;color:var(--text2);margin-bottom:4px;">⭐ 分数</label><input id="editTaskScoreInput" type="number" value="' + oldScore + '" min="0" style="width:100%;padding:8px 10px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;font-size:14px;outline:none;"></div>';
    dialog.innerHTML += '<div style="margin-bottom:10px;"><label style="display:block;font-size:12px;color:var(--text2);margin-bottom:4px;">📂 主分类</label><select id="editTaskCategoryInput" style="width:100%;padding:8px 10px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;font-size:13px;outline:none;">';
    TASK_CATEGORIES.forEach(function(c) { dialog.innerHTML += '<option value="' + c.id + '">' + c.icon + ' ' + c.name + '</option>'; });
    dialog.innerHTML += '<option value="无">📂 无</option></select></div>';
    dialog.innerHTML += '<div style="margin-bottom:16px;"><label style="display:block;font-size:12px;color:var(--text2);margin-bottom:4px;">🏷️ 子标签</label><select id="editTaskSubTagInput" style="width:100%;padding:8px 10px;background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;font-size:13px;outline:none;">';
    SUB_TAGS.forEach(function(t) { dialog.innerHTML += '<option value="' + t + '">' + t + '</option>'; });
    dialog.innerHTML += '</select></div>';
    dialog.innerHTML += '<div style="display:flex;gap:8px;justify-content:flex-end;"><button id="editTaskCancelBtn" style="padding:6px 18px;border:1px solid var(--border);background:transparent;color:var(--text2);border-radius:6px;cursor:pointer;font-size:13px;">取消</button><button id="editTaskConfirmBtn" style="padding:6px 18px;border:none;background:var(--accent);color:#fff;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;">确认</button></div>';
    overlay.appendChild(dialog);
    document.body.appendChild(overlay);
    var catSel = document.getElementById('editTaskCategoryInput');
    if (catSel && currentCategory) catSel.value = currentCategory;
    var subSel = document.getElementById('editTaskSubTagInput');
    if (subSel && currentSubTag) subSel.value = currentSubTag;
    setTimeout(function() { var ni = document.getElementById('editTaskNameInput'); if (ni) ni.focus(); }, 100);
    return new Promise(function(resolve) {
        var nameInput = document.getElementById('editTaskNameInput');
        var scoreInput = document.getElementById('editTaskScoreInput');
        var catInput = document.getElementById('editTaskCategoryInput');
        var subInput = document.getElementById('editTaskSubTagInput');
        var confirmBtn = document.getElementById('editTaskConfirmBtn');
        var cancelBtn = document.getElementById('editTaskCancelBtn');
        function closeDialog() { if (overlay.parentNode) overlay.remove(); resolve(); }
        function handleConfirm() {
            var newName = nameInput.value.trim();
            var newScore = parseInt(scoreInput.value);
            var newCategory = catInput ? catInput.value : '无';
            var newSubTag = subInput ? subInput.value : '无';
            if (!newName) { showToast('⚠️请输入任务名称', 'warning'); return; }
            if (isNaN(newScore) || newScore < 0) { showToast('⚠️请输入有效的分数（大于等于0）', 'warning'); return; }
            closeDialog();
            doUpdateTask(id, newName, newScore, newCategory, newSubTag);
        }
        confirmBtn.addEventListener('click', handleConfirm);
        cancelBtn.addEventListener('click', closeDialog);
        nameInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') handleConfirm(); });
        scoreInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') handleConfirm(); });
        overlay.addEventListener('click', function(e) { if (e.target === overlay) closeDialog(); });
    });
}

async function doUpdateTask(id, newName, newScore, newCategory, newSubTag) {
    try {
        await db.tasks.update(id, { task_name: newName, score: newScore, category: newCategory, sub_tag: newSubTag });
        showToast('✅任务已更新', 'success');
        await refreshCurrentGuildData();
        loadTasksToSelect();
        loadTaskList();
    } catch (e) { showToast('❌修改失败', 'error'); }
}

async function deleteTask(id) {
    if (!confirm('确定删除整个任务吗？')) return;
    try { await db.tasks.delete(id); showToast('🗑️已删除', 'success'); loadTaskList(); }
    catch (e) { showToast('❌删除失败', 'error'); }
}

async function removeTaskMember(taskId, memberId) {

        loadTaskList();
    } catch (e) { showToast('❌移除失败', 'error'); }
}

function filterTaskList(q) {
    if (!q) { loadTaskList(); return; }
    var filtered = allTasks.filter(function(t) { return t.task_name.toLowerCase().includes(q.toLowerCase()); });
    var div = document.getElementById('taskList');
    if (!filtered.length) { div.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><div class="text">未找到匹配任务</div></div>'; return; }
    var categorized = {};
    var allCats = TASK_CATEGORIES.concat([{ id: '无', icon: '📂', name: '无' }]);
    for (var i = 0; i < allCats.length; i++) categorized[allCats[i].id] = [];
    for (var j = 0; j < filtered.length; j++) {
        var t = filtered[j];
        var cat = t.category;
        if (!cat || !TASK_CATEGORIES.some(function(c) { return c.id === cat; })) cat = '无';
        if (!categorized[cat]) categorized[cat] = [];
        categorized[cat].push(t);
    }
    var html = '';
    html += '<div class="sub-tag-filter"><input type="checkbox" id="showSubTagCheck" ' + (showSubTag ? 'checked' : '') + ' onchange="toggleSubTag()"><label for="showSubTagCheck">☑️ 显示子分类（农/商/文/娱）</label></div>';
    for (var k = 0; k < allCats.length; k++) {
        var tasks = categorized[allCats[k].id] || [];
        if (!tasks.length) continue;
        html += '<div class="card" style="padding:8px 12px;"><div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0;"><span style="font-weight:600;font-size:13px;">' + allCats[k].icon + ' ' + allCats[k].name + ' (' + tasks.length + '个)</span></div><div class="task-grid">';
        for (var l = 0; l < tasks.length; l++) {
            var t2 = tasks[l];
            var checked = selectedTasks.has(t2.id) ? 'checked' : '';
            var subTagDisplay2 = t2.sub_tag && t2.sub_tag !== '无' ? '<span class="tag sub-tag">' + t2.sub_tag + '</span>' : '';
            html += '<div class="task-item" style="cursor:default;">';
            html += '<div class="task-main">';
            html += '<input type="checkbox" ' + checked + ' onchange="toggleSelectTask(' + t2.id + ')" style="width:14px;height:14px;cursor:pointer;flex-shrink:0;">';
            html += '<span class="task-name">' + t2.task_name + '</span>';
            html += subTagDisplay2;
            html += '<span class="task-score">⭐' + t2.score + '分</span>';
            html += '<div class="task-actions"><button class="btn btn-outline btn-xs" onclick="event.stopPropagation();editTask(' + t2.id + ',\'' + t2.task_name.replace(/'/g, "\\'") + '\',' + t2.score + ')">✏️</button><button class="btn btn-danger btn-xs" onclick="event.stopPropagation();deleteTask(' + t2.id + ')">✕</button></div>';
            html += '</div></div>';
        }
        html += '</div></div>';
    }
    div.innerHTML = html;
}

async function addMember() {
    if (!currentGuildId) { showToast('⚠️请先进公会', 'warning'); return; }
    var name = document.getElementById('newMemberName').value.trim();
    var alias = document.getElementById('newMemberAlias').value.trim();
    if (!name) { showToast('⚠️请输入大名', 'warning'); return; }
    try {
        await db.members.create({ guild_id: currentGuildId, real_name: name, alias: alias });
        showToast('✅添加成功！', 'success');
        document.getElementById('newMemberName').value = '';
        document.getElementById('newMemberAlias').value = '';
        await refreshCurrentGuildData();
        loadMemberList();
    } catch (e) { showToast('❌大名可能已存在', 'error'); }
}

async function batchImportMembers() {
    if (!currentGuildId) { showToast('⚠️请先进公会', 'warning'); return; }
    var text = document.getElementById('batchMemberImport').value.trim();
    if (!text) { showToast('⚠️请输入成员数据', 'warning'); return; }
    var lines = text.split('\n').filter(function(l) { return l.trim(); });
    var created = 0, updated = 0, fail = 0;
    for (var i = 0; i < lines.length; i++) {
        var parts = lines[i].split(',').map(function(s) { return s.trim(); });
        var name = parts[0], alias = parts.slice(1).join(',');
        if (!name) { fail++; continue; }
        try {
            var existing = await db.members.getByName(currentGuildId, name);
            if (existing.length) {
                await db.members.update(existing[0].id, { alias: alias });
                updated++;
            } else {
                await db.members.create({ guild_id: currentGuildId, real_name: name, alias: alias });
                created++;
            }
        } catch (e) { console.warn('导入失败:', name, e.message); fail++; }
    }
    var msg = '✅新增' + created + '人';
    if (updated > 0) msg += '，更新' + updated + '人';
    if (fail > 0) msg += '，失败' + fail + '人（F12查看）';
    showToast(msg, 'success');
    document.getElementById('batchMemberImport').value = '';
    await refreshCurrentGuildData();
    loadMemberList();
}

async function loadMemberList(filterQuery) {
    filterQuery = filterQuery || '';
    var div = document.getElementById('memberList');
    if (!div || !currentGuildId) return;
    try {
        allMembers = await db.members.list(currentGuildId);
        var filtered = allMembers;
        if (filterQuery) {
            var q = filterQuery.toLowerCase();
            filtered = allMembers.filter(function(m) { return m.real_name.toLowerCase().includes(q) || (m.alias || '').toLowerCase().includes(q); });
        }
        var ce = document.getElementById('memberCount');
        if (ce) ce.textContent = '（' + filtered.length + '/' + allMembers.length + '人）';

async function loadMemberRecommendData() {

async function saveRecommendTarget() {
    if (!currentGuildId) { showToast('⚠️请先进公会', 'warning'); return; }
    var memberId = document.getElementById('recommendMemberSelect').value;
    var targetScore = parseInt(document.getElementById('recommendTargetSelect').value) || 0;
    var checkedScores = [];
    document.querySelectorAll('#recommendScoreFilters input[type="checkbox"]:checked').forEach(function(cb) {
        checkedScores.push(parseInt(cb.value));
    });
    if (!memberId) { showToast('⚠️请选择成员', 'warning'); return; }
    if (!targetScore) { showToast('⚠️请选择目标档位', 'warning'); return; }
    if (!checkedScores.length) { showToast('⚠️请至少选择一个分数档位', 'warning'); return; }

    try {
        // 先删后插
        await db.recommendTargets.delete(currentGuildId, parseInt(memberId));
        await db.recommendTargets.upsert({
            guild_id: currentGuildId,
            member_id: parseInt(memberId),
            target_score: targetScore,
            selected_scores: checkedScores.join(',')
        });
        showToast('✅ 目标已保存！', 'success');
        document.getElementById('recommendSaveResult').innerHTML = '<div style="color:var(--success);font-size:13px;">✅ 保存成功！</div>';
        setTimeout(function() { document.getElementById('recommendSaveResult').innerHTML = ''; }, 3000);
        await loadRecommendCards();
        await refreshCurrentGuildData();
    } catch (e) {
        showToast('❌ 保存失败：' + (e.message || '未知错误'), 'error');
        console.error(e);
    }
}

async function loadRecommendCards() {
    var container = document.getElementById('recommendCardContainer');
    if (!container || !currentGuildId) return;
    try {
        var targets = await db.recommendTargets.list(currentGuildId);
        if (!targets.length) {
            container.innerHTML = '<div class="empty-state"><div class="icon">📭</div><div class="text">暂无成员保存目标</div></div>';
            return;
        }
        var members = await db.members.list(currentGuildId);
        var allTasks = await db.tasks.list(currentGuildId);
        var html = '<div class="recommend-card-grid">';
        for (var i = 0; i < targets.length; i++) {
            var target = targets[i];
            var member = members.find(function(m) { return m.id === target.member_id; });
            if (!member) continue;
            var scores = target.selected_scores ? target.selected_scores.split(',').map(Number) : [];
            var memberTasks = await db.taskMembers.listByMember(member.id);
            var taskIds = memberTasks.map(function(t) { return t.task_id; });
            var availableTasks = allTasks.filter(function(t) { return taskIds.includes(t.id); });
            var selectedTasks2 = availableTasks.filter(function(t) { return scores.includes(t.score); });
            var totalAvailable = availableTasks.length;

            html += '<div class="recommend-card" data-memberid="' + member.id + '">';
            html += '<button class="rc-delete" onclick="deleteRecommendTarget(' + member.id + ')" title="删除目标">✕</button>';
            html += '<div class="rc-name">' + member.real_name + '</div>';
            html += '<div class="rc-target">🎯 ' + target.target_score + '分</div>';
            html += '<div class="rc-scores">📊 ' + scores.join('、') + '分</div>';
            html += '<div class="rc-count">📋 可做 ' + selectedTasks2.length + ' 个任务（共' + totalAvailable + '个）</div>';
            html += '<button class="rc-edit" onclick="editRecommendTarget(' + member.id + ')">✏️ 修改</button>';
            html += '<div class="rc-body" id="rc_body_' + member.id + '">';
            if (selectedTasks2.length) {
                html += '<div style="font-size:11px;color:var(--text2);margin-top:4px;">📋 目标任务：</div>';
                selectedTasks2.forEach(function(t) {
                    html += '<div class="task-item" style="font-size:11px;padding:2px 4px;cursor:default;">' + t.task_name + ' ⭐' + t.score + '</div>';
                });
            } else {
                html += '<div style="font-size:11px;color:var(--text2);">暂无匹配任务</div>';
            }
            html += '</div>';
            html += '<div style="font-size:11px;color:var(--text2);margin-top:4px;cursor:pointer;" onclick="toggleRecommendCard(' + member.id + ')">▼ 展开</div>';
            html += '</div>';
        }
        html += '</div>';
        container.innerHTML = html;
    } catch (e) {
        container.innerHTML = '<div class="empty-state"><div class="icon">❌</div><div class="text">加载失败</div></div>';
        console.error(e);
    }
}

function toggleRecommendCard(memberId) {
    var body = document.getElementById('rc_body_' + memberId);
    if (!body) return;
    body.classList.toggle('open');
    var parent = body.closest('.recommend-card');
    var toggleText = parent.querySelector('.rc-body ~ div');
    if (toggleText) {
        toggleText.textContent = body.classList.contains('open') ? '▲ 收起' : '▼ 展开';

}

    while (exists) {

    try {
        await db.guilds.create({ name: name, invite_code: code, admin_note: note });
        showToast('🎉创建成功！邀请码：' + code, 'success');

    try {

        var filtered = members.filter(function(m) { return m.real_name.includes(q) || (m.alias || '').includes(q); });
        if (!filtered.length) { div.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><div class="text">未找到</div></div>'; return; }
        var targets = await db.recommendTargets.list(currentGuildId);
        var targetMap = {};
        targets.forEach(function(rt) {
            targetMap[rt.member_id] = {
                targetScore: rt.target_score,
                selectedScores: rt.selected_scores ? rt.selected_scores.split(',').map(Number) : []
            };
        });
        var html = '';
        for (var i = 0; i < filtered.length; i++) {
            var m = filtered[i];
            var tml = await db.taskMembers.listByMember(m.id);
            var tids = tml.map(function(t) { return t.task_id; });
            var tasks = allTasks.filter(function(t) { return tids.includes(t.id); });
            tasks.sort(function(a, b) { return b.score - a.score; });
            var target = targetMap[m.id];
            var priorityTasks = [];
            var otherTasks = [];
            if (target && target.selectedScores.length > 0) {
                priorityTasks = tasks.filter(function(t) { return target.selectedScores.includes(t.score); });
                otherTasks = tasks.filter(function(t) { return !target.selectedScores.includes(t.score); });
                priorityTasks.sort(function(a, b) { return b.score - a.score; });
                otherTasks.sort(function(a, b) { return b.score - a.score; });
            } else {
                otherTasks = tasks;
                otherTasks.sort(function(a, b) { return b.score - a.score; });
            }
            html += '<div class="card"><div class="card-header"><span class="card-title">👤' + m.real_name + '</span></div><div style="font-size:11px;color:var(--text2);">别名：' + (m.alias || '无') + '</div><div style="font-size:11px;color:var(--gold);font-weight:600;">📋能做：共 ' + tasks.length + ' 个任务</div>';
            if (priorityTasks.length > 0) {
                html += '<div style="font-size:11px;color:var(--accent);margin-top:4px;">⭐ 优先推荐（' + priorityTasks.length + '个）：</div><div class="member-tags">' + priorityTasks.map(function(t) { return '<span class="tag gold">' + t.task_name + ' ⭐' + t.score + '</span>'; }).join('') + '</div><hr style="border-color:var(--border);margin:4px 0;">';
            }
            if (otherTasks.length > 0) {
                html += '<div style="font-size:11px;color:var(--text2);margin-top:4px;">📋 所有能做的任务（' + otherTasks.length + '个）：</div><div class="member-tags">' + otherTasks.map(function(t) { return '<span class="tag gold">' + t.task_name + ' ⭐' + t.score + '</span>'; }).join('') + '</div>';
            }
            html += '</div>';
        }
        div.innerHTML = html;
    } catch (e) { div.innerHTML = '<div class="empty-state"><div class="icon">❌</div><div class="text">查询失败</div></div>'; }
}

async function searchTaskForMember() {
    var q = document.getElementById('memberSearchTask').value.trim();
    var div = document.getElementById('memberTaskResult');
    if (!q) { div.innerHTML = ''; return; }
    showToast('🔍搜索中...', 'info');
    try {
        var tasks = await db.tasks.list(currentGuildId);
        var filtered = tasks.filter(function(t) { return t.task_name.includes(q); });
        if (!filtered.length) { div.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><div class="text">未找到</div></div>'; return; }
        var targets = await db.recommendTargets.list(currentGuildId);
        var targetMap = {};
        targets.forEach(function(rt) {
            targetMap[rt.member_id] = {
                targetScore: rt.target_score,
                selectedScores: rt.selected_scores ? rt.selected_scores.split(',').map(Number) : []
            };
        });
        var html = '';
        for (var i = 0; i < filtered.length; i++) {
            var t = filtered[i];
            var tml = await db.taskMembers.list(t.id);
            var mids = tml.map(function(tm) { return tm.member_id; });
            var allMembersList = await db.members.list(currentGuildId);
            var members = allMembersList.filter(function(m) { return mids.includes(m.id); });
            var wantMembers = [];
            var otherMembers = [];
            for (var j = 0; j < members.length; j++) {
                var m = members[j];
                var target = targetMap[m.id];
                if (target && target.selectedScores.includes(t.score) && target.targetScore >= t.score) {
                    wantMembers.push(m);
                } else {
                    otherMembers.push(m);
                }
            }
            html += '<div class="card"><div class="card-header"><span class="card-title">📋' + t.task_name + '</span><span class="tag gold">⭐' + t.score + '分</span></div>';
            if (wantMembers.length > 0) {
                html += '<div style="font-size:11px;color:var(--accent);margin-top:4px;">⭐ 最想做这个任务的人（共' + wantMembers.length + '人）：</div><div class="member-tags">' + wantMembers.map(function(m) { return '<span class="member-tag">' + m.real_name + '</span>'; }).join('') + '</div>';
                if (otherMembers.length > 0) html += '<hr style="border-color:var(--border);margin:4px 0;">';
            }
            if (otherMembers.length > 0) {
                html += '<div style="font-size:11px;color:var(--text2);margin-top:4px;">👥 其他能做的人（共' + otherMembers.length + '人）：</div><div class="member-tags">' + otherMembers.map(function(m) { return '<span class="member-tag">' + m.real_name + '</span>'; }).join('') + '</div>';
            }
            if (members.length === 0) html += '<div style="font-size:11px;color:var(--text2);margin-top:4px;">暂无成员能做</div>';
            html += '<button class="btn btn-outline btn-sm" style="margin-top:4px" onclick="window._memberTaskResultCallback(' + t.id + ')">🙋我也能做！</button></div>';
        }
        div.innerHTML = html;
        document.getElementById('addSelfBox').style.display = 'none';
        showToast('✅找到' + filtered.length + '个任务', 'success');
    } catch (e) {
        div.innerHTML = '<div class="empty-state"><div class="icon">❌</div><div class="text">查询失败</div></div>';
        showToast('❌查询失败', 'error');
        console.error(e);
    }
}

async function addSelfToTask() {
    var taskId = window._currentTaskId;
    if (!taskId) { showToast('⚠️请先搜索任务', 'warning'); return; }
    var name = document.getElementById('addSelfName').value.trim();
    var alias = document.getElementById('addSelfAlias').value.trim();
    if (!name) { showToast('⚠️请输入大名', 'warning'); return; }
    try {
        var member;
        var ex = await db.members.getByName(currentGuildId, name);
        if (ex.length) member = ex[0];
        else { var created = await db.members.create({ guild_id: currentGuildId, real_name: name, alias: alias }); member = created[0]; }
        await db.taskMembers.add({ task_id: taskId, member_id: member.id });
        showToast('✅已添加到任务！', 'success');
        document.getElementById('addSelfName').value = '';
        document.getElementById('addSelfAlias').value = '';
        document.getElementById('addSelfBox').style.display = 'none';
        await refreshCurrentGuildData();
        searchTaskForMember();
    } catch (e) { showToast('❌添加失败，可能已存在', 'error'); }
}

async function batchDeleteTasks() {
    if (!selectedTasks.size) { showToast('⚠️请先勾选任务', 'warning'); return; }
    if (!confirm('确定删除' + selectedTasks.size + '个任务吗？')) return;

    showToast('✅删除' + s + '个' + (f > 0 ? '，失败' + f + '个' : ''), 'success');

}

async function usePresetTemplate() {
    if (!currentGuildId) { showToast('⚠️请先进公会', 'warning'); return; }
    var totalCount = Object.values(PRESET_TEMPLATE).reduce(function(sum, arr) { return sum + arr.length; }, 0);
    if (!confirm('⚠️将导入预设模板（' + totalCount + '个任务），\n已存在的同名任务会跳过。\n确定继续吗？')) return;
    showToast('⏳正在导入模板...', 'info');
    try {
        var existingTasks = await db.tasks.list(currentGuildId);
        var existingNames = new Set(existingTasks.map(function(t) { return t.task_name; }));
        var s = 0, skip = 0;
        for (var category in PRESET_TEMPLATE) {
            var tasks = PRESET_TEMPLATE[category];
            for (var i = 0; i < tasks.length; i++) {
                var name = tasks[i][0];
                var score = tasks[i][1];
                var subTag = tasks[i][2] || '无';
                if (existingNames.has(name)) { skip++; continue; }
                try {
                    await db.tasks.create({ guild_id: currentGuildId, task_name: name, score: score, category: category, sub_tag: subTag });
                    existingNames.add(name);
                    s++;
                } catch (e) { console.warn('导入失败:', name, e.message); }
            }
        }
        showToast('✅成功导入' + s + '个' + (skip > 0 ? '，跳过' + skip + '个已有任务' : ''), 'success');
        await refreshCurrentGuildData();
        loadTasksToSelect();
        loadTaskList();
    } catch (e) { showToast('❌导入失败', 'error'); console.error(e); }
}

function saveMyTemplate() {
    if (!allTasks.length) { showToast('⚠️当前没有任务可保存', 'warning'); return; }
    var data = allTasks.map(function(t) { return t.task_name + ',' + t.score + ',' + (t.category || '无') + ',' + (t.sub_tag || '无'); }).join('\n');
    localStorage.setItem('guild_my_template', data);
    showToast('💾已保存' + allTasks.length + '个任务为模板', 'success');
}

async function loadMyTemplate() {
    if (!currentGuildId) { showToast('⚠️请先进公会', 'warning'); return; }
    var data = localStorage.getItem('guild_my_template');
    if (!data) { showToast('⚠️没有已保存的模板', 'warning'); return; }
    var lines = data.split('\n').filter(function(l) { return l.trim(); });
    if (!confirm('📂加载我的模板（' + lines.length + '个任务），确定导入吗？')) return;
    showToast('⏳正在导入...', 'info');
    try {
        var existingTasks = await db.tasks.list(currentGuildId);
        var existingNames = new Set(existingTasks.map(function(t) { return t.task_name; }));
        var validCategories = TASK_CATEGORIES.map(function(c) { return c.id; });
        var s = 0, skip = 0;
        for (var i = 0; i < lines.length; i++) {
            var parts = lines[i].split(',').map(function(p) { return p.trim(); });
            if (!parts[0]) continue;
            if (existingNames.has(parts[0])) { skip++; continue; }
            var category = '无';
            if (parts[2] && validCategories.includes(parts[2])) category = parts[2];
            var subTag = '无';
            if (parts[3] && SUB_TAGS.includes(parts[3])) subTag = parts[3];
            try {
                await db.tasks.create({ guild_id: currentGuildId, task_name: parts[0], score: parseInt(parts[1]) || 0, category: category, sub_tag: subTag });
                existingNames.add(parts[0]);
                s++;
            } catch (e) { console.warn('导入失败:', parts[0], e.message); }
        }
        showToast('✅导入' + s + '个' + (skip > 0 ? '，跳过' + skip + '个' : ''), 'success');
        await refreshCurrentGuildData();
        loadTasksToSelect();
        loadTaskList();
    } catch (e) { showToast('❌导入失败', 'error'); console.error(e); }
}

function editPresetTemplate() {
    var lines = [];
    for (var category in PRESET_TEMPLATE) {
        var tasks = PRESET_TEMPLATE[category];
        for (var i = 0; i < tasks.length; i++) {
            lines.push(tasks[i][0] + ',' + tasks[i][1] + ',' + category + ',' + (tasks[i][2] || '无'));
        }
    }
    var current = lines.join('\n');
    var newData = prompt('✏️编辑预设模板（每行：任务名,分数,主分类,子标签）\n主分类：人才 / 人才觉醒 / 人才皮肤 / 艺人 / 艺人皮肤 / 守护神\n子标签：农 / 商 / 文 / 娱 / 无', current);
    if (newData === null) return;
    var newLines = newData.split('\n').filter(function(l) { return l.trim(); });
    var newTemplate = {};
    var allCats = TASK_CATEGORIES.concat([{ id: '无', icon: '📂', name: '无' }]);
    for (var j = 0; j < allCats.length; j++) newTemplate[allCats[j].id] = [];
    var validCategories2 = TASK_CATEGORIES.map(function(c) { return c.id; });
    for (var k = 0; k < newLines.length; k++) {
        var parts2 = newLines[k].split(',').map(function(p) { return p.trim(); });
        if (!parts2[0]) continue;
        var category2 = '无';
        if (parts2[2] && validCategories2.includes(parts2[2])) category2 = parts2[2];
        var subTag2 = '无';
        if (parts2[3] && SUB_TAGS.includes(parts2[3])) subTag2 = parts2[3];
        if (!newTemplate[category2]) newTemplate[category2] = [];
        newTemplate[category2].push([parts2[0], parseInt(parts2[1]) || 0, subTag2]);
    }
    Object.keys(PRESET_TEMPLATE).forEach(function(key) { delete PRESET_TEMPLATE[key]; });
    for (var key in newTemplate) {
        if (newTemplate[key].length) PRESET_TEMPLATE[key] = newTemplate[key];
    }
    var total = Object.values(PRESET_TEMPLATE).reduce(function(sum, arr) { return sum + arr.length; }, 0);
    showToast('✅预设模板已更新（' + total + '个任务）', 'success');
}

// ===== 启动 =====
(async function init() {
    var rememberedCode = getRememberedCode();
    if (rememberedCode) document.getElementById('loginInput').value = rememberedCode;
    var sess = session.get();
    if (sess) {
        if (sess.role === 'admin') {
            currentRole = 'admin';
            showMainPage();
            await loadAdminPage();
        } else if (sess.role === 'member' && sess.guildId) {
            currentRole = 'member';
            currentGuildId = sess.guildId;
            try {
                var guilds = await db.guilds.get(sess.guildId);
                if (guilds.length) {
                    showMainPage();
                    await loadMemberPage(guilds[0]);
                } else {
                    showToast('⚠️公会已删除，请重新登录', 'warning');
                    showLoginPage();
                }
            } catch (e) { showMainPage(); }
        }
    }
    resetTimeout();
})();
</script>
